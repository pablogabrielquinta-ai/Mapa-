<script>
'use strict';
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}
/* Al abrir el HTML como archivo local (file://), el navegador bloquea el worker
   remoto de pdf.js. Solución: bajar el código del worker y cargarlo como Blob. */
var _workerListo = null;
function asegurarPdfWorker(){
  if (_workerListo) return _workerListo;
  _workerListo = fetch('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js')
    .then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(function(codigo){
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        URL.createObjectURL(new Blob([codigo], { type: 'application/javascript' }));
    })
    .catch(function(){ /* si falla, queda el workerSrc por URL como estaba */ });
  return _workerListo;
}

/* ================= ESTADO GLOBAL ================= */
var puntos = [];            // {lat, lng, remesa, ruta, detalle}
try {
  var _ap = JSON.parse(localStorage.getItem('altas_guardadas') || 'null');
  if (_ap && _ap.length) puntos = _ap;
} catch(e){}
function guardarPuntos(){
  try { localStorage.setItem('altas_guardadas', JSON.stringify(puntos)); } catch(e){}
}
function claveP(p){
  var med = (p.detalle && p.detalle.medidor) ? p.detalle.medidor : '';
  return med + '|' + p.lat.toFixed(6) + '|' + p.lng.toFixed(6);
}

/* Diagnóstico del último procesamiento de PDFs */
var diagPdf = { lineas: 0, filas: 0, muestras: [] };

/* Direcciones de medidores extraídas de la tabla de los PDFs */
var dirsPend = {}, dirsHechas = {};
var dirCorriendo = false;
try { dirsPend = JSON.parse(localStorage.getItem('dirs_pendientes') || '{}'); } catch(e){}
try { dirsHechas = JSON.parse(localStorage.getItem('dirs_hechas') || '{}'); } catch(e){}
function guardarDirs(){
  try {
    localStorage.setItem('dirs_pendientes', JSON.stringify(dirsPend));
    localStorage.setItem('dirs_hechas', JSON.stringify(dirsHechas));
  } catch(e){}
}
/* "AV. 3 DE ABRIL 100", "QUINTANA 525 P:1 D:5" → calle normalizada + altura.
   Primero corta sufijos de unidad, después toma la altura del final. */
var RE_UNIDAD = /\s(P[:.]|PB\b|D[:.]|C[:.]|RES\b|RES[.:]|RESID|UF\b|S[:.]\s?GRAL|LOCAL\b|OFICINA\b|ESQ|PISO\b|DPTO|DTO\b|EDIF|T\.|BIS\b|L[:.]|N[°º]|SERV\b)/i;
function dirDeDomicilio(dom){
  var s = String(dom).trim();
  var corte = s.search(RE_UNIDAD);
  if (corte > 0) s = s.substring(0, corte).trim();
  /* altura = número al final del texto restante */
  var m = s.match(/^(.*\S)\s+(\d{1,5})\s*$/);
  if (!m) m = s.match(/^(.+)\s+(\d{1,5})\b/);   // último recurso: número con espacio previo
  if (!m) return null;
  var calle = normalizarCalle(m[1]);
  if (!calle || calle.length < 4) return null;
  return { calle: calle, altura: parseInt(m[2], 10) };
}
var remesasOff = {};        // remesas ocultas
var rutaFiltro = '';
var colorMap = {};
var descartados = 0;
var PALETA = ['#e6194b','#3cb44b','#4363d8','#f58231','#911eb4',
              '#42d4f4','#f032e6','#bfef45','#fabed4','#469990',
              '#dcbeff','#9a6324'];
/* Colores fijos: Remesa 1-8 siempre con el mismo color */
for (var _i = 1; _i <= 8; _i++) colorMap[String(_i)] = PALETA[_i - 1];

/* Rango válido aproximado para Corrientes Capital y alrededores */
var LAT_MIN = -28.6, LAT_MAX = -27.0, LNG_MIN = -59.4, LNG_MAX = -58.2;

/* ================= MAPA ================= */
var map = L.map('map', { preferCanvas:true, zoomControl:false })
           .setView([-27.4692, -58.8306], 13);
L.control.zoom({ position:'topright' }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap'
}).addTo(map);
var capa = L.layerGroup().addTo(map);

/* ================= UTILIDADES ================= */
function $(id){ return document.getElementById(id); }

function avisar(msg, esError, fijo){
  var e = $('estado');
  e.textContent = msg;
  e.className = esError ? 'error' : '';
  e.style.display = 'block';
  clearTimeout(avisar._t);
  if (!fijo) avisar._t = setTimeout(function(){ e.style.display='none'; }, 3500);
}

function coordValida(lat, lng){
  return isFinite(lat) && isFinite(lng) &&
         lat >= LAT_MIN && lat <= LAT_MAX &&
         lng >= LNG_MIN && lng <= LNG_MAX;
}

function colorDe(remesa){
  if (!colorMap[remesa]){
    var n = Object.keys(colorMap).length;
    colorMap[remesa] = PALETA[n % PALETA.length];
  }
  return colorMap[remesa];
}
/* ================= LECTURA DESDE FIS_DB ================= */
function cargarFisDb(){
  avisar('Abriendo FIS_DB…', false, true);
  var req = indexedDB.open('FIS_DB');
  req.onerror = function(){ avisar('No se pudo abrir FIS_DB en este navegador.', true); };
  req.onsuccess = function(ev){
    var db = ev.target.result;
    var stores = Array.prototype.slice.call(db.objectStoreNames);
    if (stores.indexOf('lecturas') === -1){
      avisar('FIS_DB no tiene el store "lecturas". Stores: ' + stores.join(', '), true);
      db.close(); return;
    }
    var tx = db.transaction('lecturas', 'readonly');
    var getAll = tx.objectStore('lecturas').getAll();
    getAll.onerror = function(){ avisar('Error leyendo lecturas.', true); db.close(); };
    getAll.onsuccess = function(){
      var recs = getAll.result || [];
      db.close();
      if (!recs.length){ avisar('FIS_DB está vacía. Importá PDFs primero con importar.html.', true); return; }
      procesarRegistros(recs);
    };
  };
}

/* Detecta automáticamente qué campos son lat/lng/remesa/ruta */
function detectarCampos(recs){
  var campos = { lat:null, lng:null, remesa:null, ruta:null };
  var muestra = recs.slice(0, 200);
  var claves = {};
  muestra.forEach(function(r){
    Object.keys(r).forEach(function(k){ claves[k] = true; });
  });
  var lista = Object.keys(claves);

  // lat / lng por rango de valores
  lista.forEach(function(k){
    var okLat = 0, okLng = 0, n = 0;
    muestra.forEach(function(r){
      var v = parseFloat(String(r[k]).replace(',', '.'));
      if (!isFinite(v)) return;
      n++;
      if (v >= LAT_MIN && v <= LAT_MAX) okLat++;
      if (v >= LNG_MIN && v <= LNG_MAX) okLng++;
    });
    if (n > 5){
      if (!campos.lat && okLat / n > 0.8) campos.lat = k;
      else if (!campos.lng && okLng / n > 0.8) campos.lng = k;
    }
  });

  // remesa / ruta por nombre de campo
  lista.forEach(function(k){
    var lk = k.toLowerCase();
    if (!campos.remesa && (lk === 'remesa' || lk === 'rem' || lk === 'per_rem')) campos.remesa = k;
    if (!campos.ruta && lk.indexOf('ruta') !== -1) campos.ruta = k;
  });
  if (!campos.remesa){
    lista.forEach(function(k){
      if (!campos.remesa && k.toLowerCase().indexOf('rem') !== -1) campos.remesa = k;
    });
  }
  return campos;
}

function procesarRegistros(recs){
  var c = detectarCampos(recs);
  if (!c.lat || !c.lng){
    avisar('No encontré campos con coordenadas GPS en las lecturas.', true);
    return;
  }
  var existentes = {};
  puntos.forEach(function(p){ existentes[claveP(p)] = true; });
  var nuevos = 0;
  descartados = 0;
  recs.forEach(function(r){
    var lat = parseFloat(String(r[c.lat]).replace(',', '.'));
    var lng = parseFloat(String(r[c.lng]).replace(',', '.'));
    if (!coordValida(lat, lng)){ descartados++; return; }
    var rem = c.remesa ? String(r[c.remesa]) : 'S/D';
    // per_rem tipo "03-12": la remesa es la segunda parte
    if (c.remesa && c.remesa.toLowerCase() === 'per_rem' && rem.indexOf('-') !== -1){
      rem = rem.split('-')[1];
    }
    var pt = {
      lat: lat, lng: lng,
      remesa: rem || 'S/D',
      ruta: c.ruta ? String(r[c.ruta]) : '',
      detalle: r
    };
    if (!existentes[claveP(pt)]){ existentes[claveP(pt)] = true; puntos.push(pt); nuevos++; }
  });
  guardarPuntos();
  avisar('FIS_DB: ' + nuevos + ' lecturas nuevas con GPS (' + descartados + ' sin coord. válida). Total: ' + puntos.length);
  reconstruirUI(true);
}

/* ================= LECTURA DESDE PDFs ================= */
/* Reconstrucción posicional: agrupa items por Y, ordena por X, arma líneas. */
function extraerLineas(page){
  return page.getTextContent().then(function(tc){
    var porY = {};
    tc.items.forEach(function(it){
      var y = Math.round(it.transform[5]);
      var encontrada = null;
      for (var dy = -2; dy <= 2; dy++){
        if (porY[y + dy]){ encontrada = y + dy; break; }
      }
      var clave = (encontrada === null) ? y : encontrada;
      if (!porY[clave]) porY[clave] = [];
      porY[clave].push({ x: it.transform[4], s: it.str });
    });
    var ys = Object.keys(porY).map(Number).sort(function(a,b){ return b - a; });
    return ys.map(function(y){
      porY[y].sort(function(a,b){ return a.x - b.x; });
      return porY[y].map(function(o){ return o.s; }).join(' ')
        .replace(/[\u200B\u200C\u200D\uFEFF]/g, '')  // caracteres de ancho cero
        .replace(/\s+/g, ' ')                            // NBSP y espacios múltiples → espacio simple
        .trim();
    });
  });
}

function remesaDeRuta(ruta){
  var r = String(parseInt(ruta, 10));
  return RUTA_REMESA[r] || 'S/D';
}

function procesarPDFs(files){
  if (!window.pdfjsLib){ avisar('pdf.js no cargó (¿hay internet?).', true); return; }
  var existentes = {};
  puntos.forEach(function(p){ existentes[claveP(p)] = true; });
  var nuevos = 0, repetidos = 0, dirsNuevas = 0;
  descartados = 0;
  diagPdf = { lineas: 0, filas: 0, muestras: [] };
  var lista = Array.prototype.slice.call(files);
  var idx = 0;
  avisar('Preparando lector de PDF…', false, true);

  function siguiente(){
    if (idx >= lista.length){
      guardarPuntos();
      guardarDirs();
      actualizarBtnDirs();
      var pend = Object.keys(dirsPend).length;
      var msg = 'PDFs: ' + nuevos + ' altas nuevas · ' + repetidos + ' repetidas.';
      if (pend) msg += ' ' + pend + ' direcciones detectadas → tocá 📍 para ubicarlas.';
      avisar(msg);
      mostrarDiag(pend);
      reconstruirUI(true);
      return;
    }
    var f = lista[idx++];
    avisar('Leyendo ' + f.name + ' (' + idx + '/' + lista.length + ')…', false, true);
    var fr = new FileReader();
    fr.onload = function(){
      pdfjsLib.getDocument({ data: fr.result }).promise.then(function(pdf){
        var rutaActual = '', periodoActual = '';
        var p = Promise.resolve();
        for (var i = 1; i <= pdf.numPages; i++){
          (function(num){
            p = p.then(function(){ return pdf.getPage(num); })
                 .then(extraerLineas)
                 .then(function(lineas){
                   lineas.forEach(function(ln){
                     diagPdf.lineas++;
                     var mt = ln.match(RE_RUTA);     if (mt) rutaActual = mt[1];
                     var mp = ln.match(RE_PERIODO);  if (mp) periodoActual = mp[1];
                     /* Fila de la tabla: "IC N°Med DOMICILIO EstAnt EstAct Consumo Fecha..." */
                     var mf = ln.match(/^\s*(\d{7,9})\s+(\d{1,10})\s+(.+?)\s+(-?\d+)\s+(-?\d+)\s+(-?\d+)\s+\d{2}\/\d{2}\/\d{4}\s/);
                     if (mf) diagPdf.filas++;
                     else if (diagPdf.muestras.length < 8 && (/^\d{7,}/.test(ln) || /\d{2}\/\d{2}\/\d{4}/.test(ln)) && ln.length > 40){
                       diagPdf.muestras.push(ln.substring(0, 130));
                     }
                     if (mf && rutaActual){
                       var d = dirDeDomicilio(mf[3]);
                       if (d){
                         var kd = d.calle + ' ' + d.altura;
                         if (!dirsHechas[kd]){
                           if (!dirsPend[kd]) dirsPend[kd] = { ruta: rutaActual,
                                                               remesa: remesaDeRuta(rutaActual),
                                                               cant: 0, meds: [] };
                           dirsPend[kd].cant++;
                           if (dirsPend[kd].meds && dirsPend[kd].meds.length < 300 &&
                               dirsPend[kd].meds.indexOf(mf[2]) === -1){
                             dirsPend[kd].meds.push(mf[2]);
                           }
                           dirsNuevas++;
                         }
                       }
                     }
                     var mg = ln.match(RE_GPS);
                     if (mg){
                       var lat = parseFloat(mg[1].replace(',', '.'));
                       var lng = parseFloat(mg[2].replace(',', '.'));
                       if (coordValida(lat, lng)){
                         // Fila de ALTAS: "ruta fecha hora numero estado domicilio obs lecturista lat lng"
                         var partes = ln.trim().split(/\s+/);
                         var medidor = (partes.length > 3 && /^\d+$/.test(partes[3])) ? partes[3] : '';
                         var pt = { lat:lat, lng:lng,
                                    remesa: remesaDeRuta(rutaActual),
                                    ruta: rutaActual,
                                    detalle: { medidor: medidor, periodo: periodoActual,
                                               linea: ln.substring(0,140), archivo: f.name } };
                         if (existentes[claveP(pt)]) repetidos++;
                         else { existentes[claveP(pt)] = true; puntos.push(pt); nuevos++; }
                       } else descartados++;
                     }
                   });
                 });
          })(i);
        }
        p.then(function(){ pdf.destroy(); siguiente(); });
      }).catch(function(e){
        avisar('Error en ' + f.name + ': ' + e.message, true);
        siguiente();
      });
    };
    fr.readAsArrayBuffer(f);
  }
  asegurarPdfWorker().then(function(){ siguiente(); });
}

function reconstruirUI(ajustarVista){
  // chips de remesa
  var conteo = {};
  puntos.forEach(function(p){ conteo[p.remesa] = (conteo[p.remesa] || 0) + 1; });
  geoDatos.segmentos.forEach(function(s){ if (!(s.remesa in conteo)) conteo[s.remesa] = 0; });
  var remesas = Object.keys(conteo).sort(function(a,b){
    var na = parseFloat(a), nb = parseFloat(b);
    if (isFinite(na) && isFinite(nb)) return na - nb;
    return a < b ? -1 : 1;
  });
  var cont = $('chipsRemesa');
  cont.innerHTML = '';
  remesas.forEach(function(rem){
    var chip = document.createElement('div');
    chip.className = 'chip' + (remesasOff[rem] ? ' off' : '');
    chip.innerHTML = '<span class="punto" style="background:' + colorDe(rem) + '"></span>' +
                     '<span>Rem ' + rem + '</span>' +
                     '<span class="cant">' + conteo[rem] + '</span>';
    chip.onclick = function(){
      remesasOff[rem] = !remesasOff[rem];
      chip.className = 'chip' + (remesasOff[rem] ? ' off' : '');
      pintar(false);
    };
    cont.appendChild(chip);
  });

  // rutas
  var rutas = {};
  puntos.forEach(function(p){ if (p.ruta) rutas[p.ruta] = true; });
  geoDatos.segmentos.forEach(function(s){ if (s.ruta) rutas[s.ruta] = true; });
  var sel = $('selRuta');
  sel.innerHTML = '<option value="">Todas las rutas</option>';
  Object.keys(rutas).sort(function(a,b){ return parseFloat(a) - parseFloat(b); })
    .forEach(function(r){
      var o = document.createElement('option');
      o.value = r; o.textContent = 'Ruta ' + r;
      sel.appendChild(o);
    });
  rutaFiltro = '';

  var hayDatos = puntos.length || geoDatos.segmentos.length;
  $('vacio').style.display = hayDatos ? 'none' : 'flex';
  $('panel').className = hayDatos ? '' : 'cerrado';
  pintar(ajustarVista);
}

function pintar(ajustarVista){
  capa.clearLayers();
  var visibles = 0, bounds = [];
  puntos.forEach(function(p){
    if (remesasOff[p.remesa]) return;
    if (rutaFiltro && p.ruta !== rutaFiltro) return;
    visibles++;
    bounds.push([p.lat, p.lng]);
    var m = L.circleMarker([p.lat, p.lng], {
      radius: 4, weight: 1, color: '#111',
      fillColor: colorDe(p.remesa), fillOpacity: 0.85
    });
    m.bindPopup(popupDe(p));
    capa.addLayer(m);
  });
  $('resumen').textContent = visibles + ' lecturas en el mapa';
  $('infoDatos').textContent = 'Total: ' + puntos.length + ' · Visibles: ' + visibles +
    ' · Descartadas (sin GPS válido): ' + descartados;
  if (ajustarVista && bounds.length) map.fitBounds(bounds, { padding:[30,30] });
  dibujarGeo();
}

function popupDe(p){
  var html = '<b class="rem" style="color:' + colorDe(p.remesa) + '">Remesa ' + p.remesa + '</b>';
  if (p.ruta) html += ' · Ruta ' + p.ruta;
  if (p.detalle && p.detalle.tipo === 'DIR'){
    html += '<br><b>' + p.detalle.direccion + '</b><br>' +
            p.detalle.medidores + ' medidor(es) en esta dirección';
    var meds = p.detalle.meds || [];
    if (meds.length){
      var ver = meds.slice(0, 15);
      html += '<br><span style="color:#555">N°Med: ' + ver.join(', ');
      if (meds.length > 15) html += ' … y ' + (meds.length - 15) + ' más';
      html += '</span>';
    }
    return html;
  }
  var cal = p.ruta ? RUTA_CALLES[String(parseInt(p.ruta,10))] : null;
  if (cal) html += '<br><i style="color:#666">' + (cal.length > 90 ? cal.substring(0,90) + '…' : cal) + '</i>';
  var d = p.detalle || {};
  var mostrados = 0;
  Object.keys(d).forEach(function(k){
    if (mostrados >= 6) return;
    var v = d[k];
    if (v === null || typeof v === 'object') return;
    var s = String(v);
    if (s.length > 60) s = s.substring(0, 60) + '…';
    html += '<br><b>' + k + ':</b> ' + s;
    mostrados++;
  });
  return html;
}

/* ============ GEOCODIFICACIÓN DEL RUTÓMETRO Y CONTORNOS ============ */
var geoDatos = { segmentos: [], hechos: {}, fallidas: [] };
var geoCache = {};
var geoCorriendo = false;
try { geoCache = JSON.parse(localStorage.getItem('geo_cache') || '{}'); } catch(e){}
try {

  if (_gd && _gd.segmentos) geoDatos = _gd;
} catch(e){}

/* Alias para que Nominatim encuentre las calles con nombre abreviado */
var ALIAS_CALLES = {
  'H. IRIGOYEN':'Hipolito Yrigoyen','H IRIGOYEN':'Hipolito Yrigoyen','H.IRIGOYEN':'Hipolito Yrigoyen',
  'H. YRIGOYEN':'Hipolito Yrigoyen','H YRIGOYEN':'Hipolito Yrigoyen','H.YRIGOYEN':'Hipolito Yrigoyen',
  'IRIGOYEN':'Hipolito Yrigoyen','YRIGOYEN':'Hipolito Yrigoyen',
  'C. PELLEGRINI':'Carlos Pellegrini','C.PELLEGRINI':'Carlos Pellegrini',
  'M. MORENO':'Mariano Moreno',
  'P. MARTINEZ':'Placido Martinez','PDO.MARTINEZ':'Placido Martinez',
  'F.J.QUINTANA':'Quintana','F. J. DE LA QUINTANA':'Quintana','F.J. DE LA QUINTANA':'Quintana',
  'A. P. JUSTO':'Agustin Pedro Justo',
  'V. SARSFIELD':'Velez Sarsfield',
  'T.COCOMAROLA':'Transito Cocomarola',
  'AV.J.R.VIDAL':'Avenida Juan Ramon Vidal','J. R. VIDAL':'Juan Ramon Vidal',
  'Q. MARTIN':'Quintin Martin','S. MORSE':'Samuel Morse'
};

/* Índice de alias normalizado (sin puntos ni espacios dobles) */
var ALIAS_NORM = {};
Object.keys(ALIAS_CALLES).forEach(function(k){
  ALIAS_NORM[k.replace(/[.]+/g, ' ').replace(/\s+/g, ' ').trim()] = ALIAS_CALLES[k];
});

function normalizarCalle(c){
  var s = c.toUpperCase()
    .replace(/\bLADO\s+(PAR|IMPAR)\b/g, ' ')
    .replace(/\b(PAR|IMPAR)\b\s*$/, ' ')
    .replace(/\bEDIF\.?\b.*$/, ' ')
    .replace(/\bBIS\b/g, ' ')
    .replace(/[".()]+/g, ' ')
    .replace(/\s{2,}/g, ' ').trim().replace(/[.\-]+$/, '').trim();
  if (ALIAS_NORM[s]) return ALIAS_NORM[s];
  s = s.replace(/^PJE\.?\s?/, 'Pasaje ')
       .replace(/^AV\.?\s?/, 'Avenida ')
       .replace(/^GDOR\.?\s?(DR\.?\s|ING\.?\s)?/, 'Gobernador ')
       .replace(/^GRAL\.?\s?/, 'General ')
       .replace(/^CNEL\.?\s?/, 'Coronel ')
       .replace(/^TTE\.?\s?C?\.?\s?/, 'Teniente ')
       .replace(/^SGTO\.?\s?/, 'Sargento ')
       .replace(/^DR\.?\s/, 'Doctor ')
       .replace(/\s{2,}/g, ' ').trim();
  return s;
}

/* "BELGRANO 800 AL 1499. M. MORENO 800 AL 1499." → tramos con calle + rango.
   Soporta separadores coma / punto y coma / punto, y varios tramos sin separador. */
function parsearDescripcion(desc){
  var segs = [];
  if (!desc || /DISPONIBLE/i.test(desc)) return segs;

  function agregar(calleRaw, n1, n2){
    var calle = normalizarCalle(calleRaw.replace(/^[\s.,;:\-]+/, ''));
    if (!calle || calle.length < 4) return;
    if (/^B[\u00B0\u00BA]/.test(calle) || /^BARRIO/i.test(calle) || /\bMBKS?\b|\bMKS?\b/.test(calle)) return; // barrios sin altura
    if (n1 === 0) n1 = 50;   // la altura 0 no geocodifica
    segs.push({ calle: calle, n1: n1, n2: n2 });
  }

  var limpio = desc.replace(/\([^)]*\)/g, ' ');   // sacar "(EX TUCUMAN)", "(HASTA ...)"
  limpio.split(/[,;]+/).forEach(function(frag){
    frag = frag.trim();
    if (!frag || frag.length < 5) return;
    var re = /(\S[^,;]*?)\s+(?:DEL?\s+|DESDE\s+(?:EL\s+)?)?(\d{1,4})\s*(?:AL?\.?|HASTA)\s*(?:EL\s+)?(\d{1,4})\b/gi;
    var m, alguno = false;
    while ((m = re.exec(frag)) !== null){
      alguno = true;
      agregar(m[1], parseInt(m[2], 10), parseInt(m[3], 10));
    }
    if (!alguno){
      var m2 = frag.match(/^(.*?)\s+AL?\s+(\d{2,4})\b/i);   // "PJE ARTIGAS AL 600" = 0 al 600
      if (m2) agregar(m2[1], 50, parseInt(m2[2], 10));
    }
  });
  return segs;
}

function claveDe(t){ return t.ruta + '|' + t.calle + '|' + t.n1 + '|' + t.n2; }

function construirTareas(){
  var tareas = [];
  Object.keys(RUTA_CALLES).forEach(function(ruta){
    var rem = RUTA_REMESA[ruta] || 'S/D';
    parsearDescripcion(RUTA_CALLES[ruta]).forEach(function(seg){
      tareas.push({ ruta: ruta, remesa: rem, calle: seg.calle, n1: seg.n1, n2: seg.n2 });
    });
  });
  return tareas;
}

/* Nominatim (OpenStreetMap): 1 consulta por segundo, con caché local */
function geocodificar(q){
  if (q in geoCache) return Promise.resolve(geoCache[q]);
  var url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=ar' +
            '&bounded=1&viewbox=-58.95,-27.30,-58.55,-27.70' +
            '&q=' + encodeURIComponent(q + ', Corrientes, Argentina');
  return fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(j){
      var res = null;
      if (j && j.length){
        var lat = parseFloat(j[0].lat), lng = parseFloat(j[0].lon);
        if (coordValida(lat, lng)) res = [lat, lng];
      }
      geoCache[q] = res;
      return new Promise(function(ok){ setTimeout(function(){ ok(res); }, 1100); });
    })
    .catch(function(){
      return new Promise(function(ok){ setTimeout(function(){ ok(null); }, 1100); });
    });
}

function guardarGeo(){
  try {
    localStorage.setItem('geo_datos', JSON.stringify(geoDatos));
    localStorage.setItem('geo_cache', JSON.stringify(geoCache));
  } catch(e){}
}

function iniciarGeo(){
  if (geoCorriendo){
    geoCorriendo = false;
    $('btnGeo').textContent = '🧭 Reanudar geocodificación';
    avisar('Pausado. El avance quedó guardado.');
    return;
  }
  var todas = construirTareas();
  var pendientes = todas.filter(function(t){ return !geoDatos.hechos[claveDe(t)]; });
  if (!pendientes.length){ avisar('Rutómetro ya geocodificado por completo ✔'); dibujarGeo(); return; }
  geoCorriendo = true;
  $('btnGeo').textContent = '⏸ Pausar';
  procesarTareas(pendientes, todas.length);
}

function procesarTareas(tareas, total){
  if (!geoCorriendo || !tareas.length){
    geoCorriendo = false;
    $('btnGeo').textContent = '🧭 Geocodificar rutas';
    guardarGeo();
    dibujarGeo();
    if (!tareas.length){
      avisar('Geocodificación completa: ' + geoDatos.segmentos.length + ' tramos ✔');
      ajustarVistaGeo();
    }
    return;
  }
  var t = tareas.shift();
  geocodificar(t.calle + ' ' + t.n1)
    .then(function(a){
      return geocodificar(t.calle + ' ' + t.n2).then(function(b){ return [a, b]; });
    })
    .then(function(res){
      geoDatos.hechos[claveDe(t)] = true;
      geoDatos.segmentos.push({ ruta: t.ruta, remesa: t.remesa, calle: t.calle,
                                n1: t.n1, n2: t.n2, a: res[0], b: res[1] });
      if (!res[0] && !res[1]) geoDatos.fallidas.push(t.calle + ' (' + t.n1 + '-' + t.n2 + ')');
      guardarGeo();
      var hechas = total - tareas.length;
      var min = Math.ceil(tareas.length * 2.3 / 60);
      avisar('Geocodificando ' + hechas + '/' + total + ' · ' + t.calle + ' · ~' + min + ' min restantes', false, true);
      if (hechas % 15 === 0) dibujarGeo();
      procesarTareas(tareas, total);
    });
}

/* Envolvente convexa (monotone chain) para el contorno de cada remesa */
function hullConvexo(pts){
  if (pts.length < 3) return pts.slice();
  var p = pts.slice().sort(function(x, y){ return x[1] - y[1] || x[0] - y[0]; });
  function cruz(o, a, b){ return (a[1]-o[1])*(b[0]-o[0]) - (a[0]-o[0])*(b[1]-o[1]); }
  var inf = [], sup = [];
  for (var i = 0; i < p.length; i++){
    while (inf.length >= 2 && cruz(inf[inf.length-2], inf[inf.length-1], p[i]) <= 0) inf.pop();
    inf.push(p[i]);
  }
  for (var j = p.length - 1; j >= 0; j--){
    while (sup.length >= 2 && cruz(sup[sup.length-2], sup[sup.length-1], p[j]) <= 0) sup.pop();
    sup.push(p[j]);
  }
  inf.pop(); sup.pop();
  return inf.concat(sup);
}

function dibujarGeo(){
  capaRutas.clearLayers();
  capaContornos.clearLayers();
  var verR = $('chkRutas').checked, verC = $('chkContornos').checked;
  var porRemesa = {};
  geoDatos.segmentos.forEach(function(s){
    if (remesasOff[s.remesa]) return;
    if (rutaFiltro && s.ruta !== rutaFiltro) return;
    var pts = [];
    if (s.a) pts.push(s.a);
    if (s.b) pts.push(s.b);
    if (!pts.length) return;
    if (!porRemesa[s.remesa]) porRemesa[s.remesa] = [];
    porRemesa[s.remesa] = porRemesa[s.remesa].concat(pts);
    if (verR){
      var info = '<b style="color:' + colorDe(s.remesa) + '">Remesa ' + s.remesa + '</b> · Ruta ' + s.ruta +
                 '<br>' + s.calle + ' ' + s.n1 + ' al ' + s.n2;
      if (pts.length === 2){
        var pl = L.polyline(pts, { color: colorDe(s.remesa), weight: 3, opacity: 0.85 });
        pl.bindPopup(info);
        capaRutas.addLayer(pl);
      } else {
        var cm = L.circleMarker(pts[0], { radius: 3, weight: 1, color: '#111',
                                          fillColor: colorDe(s.remesa), fillOpacity: 0.8 });
        cm.bindPopup(info + '<br><i>(solo un extremo ubicado)</i>');
        capaRutas.addLayer(cm);
      }
    }
  });
  /* Los GPS reales de las altas también refinan el contorno */
  puntos.forEach(function(p){
    if (remesasOff[p.remesa]) return;
    if (rutaFiltro && p.ruta !== rutaFiltro) return;
    if (!porRemesa[p.remesa]) porRemesa[p.remesa] = [];
    porRemesa[p.remesa].push([p.lat, p.lng]);
  });
  if (verC){
    Object.keys(porRemesa).forEach(function(rem){
      var h = hullConvexo(porRemesa[rem]);
      if (h.length >= 3){
        var pg = L.polygon(h, { color: colorDe(rem), weight: 2, dashArray: '6 4',
                                fillColor: colorDe(rem), fillOpacity: 0.10 });
        pg.bindPopup('<b style="color:' + colorDe(rem) + '">Remesa ' + rem + '</b> · contorno aproximado');
        capaContornos.addLayer(pg);
      }
    });
  }
  actualizarGeoEstado();
}

function actualizarGeoEstado(){
  var n = geoDatos.segmentos.length;
  if (!n){ $('geoEstado').textContent = 'Sin datos geocodificados todavía.'; return; }
  var ubicados = geoDatos.segmentos.filter(function(s){ return s.a || s.b; }).length;
  $('geoEstado').textContent = n + ' tramos procesados · ' + ubicados + ' ubicados en el mapa · ' +
                               geoDatos.fallidas.length + ' sin ubicar';
}

function ajustarVistaGeo(){
  var b = [];
  geoDatos.segmentos.forEach(function(s){
    if (s.a) b.push(s.a);
    if (s.b) b.push(s.b);
  });
  if (b.length) map.fitBounds(b, { padding: [30, 30] });
}

function mostrarDiag(pendientes){
  var d = $('diagPdf');
  var t = '🔬 Último PDF: ' + diagPdf.lineas + ' líneas leídas · ' +
          diagPdf.filas + ' filas de tabla reconocidas · ' +

  if (diagPdf.filas === 0 && diagPdf.muestras.length){

function actualizarBtnDirs(){
  var n = Object.keys(dirsPend).length;
  $('btnDirs').textContent = dirCorriendo ? '⏸ Pausar ubicación (' + n + ' pendientes)'
    : (n ? '📍 Ubicar medidores (' + n + ' direcciones)' : '📍 Ubicar medidores por dirección');
}

function ubicarDirs(){
  if (dirCorriendo){
    dirCorriendo = false;
    actualizarBtnDirs();
    avisar('Pausado. El avance quedó guardado.');
    return;
  }
  var claves = Object.keys(dirsPend);
  if (!claves.length){
    avisar('Primero cargá el PDF de una ruta para detectar las direcciones 👇');
    setTimeout(function(){ $('filePdf').click(); }, 600);
    return;
  }
  dirCorriendo = true;
  actualizarBtnDirs();
  procesarDirs(claves, claves.length, 0);
}

function procesarDirs(claves, total, ubicadas){
  if (!dirCorriendo || !claves.length){
    dirCorriendo = false;
    guardarPuntos(); guardarDirs();
    actualizarBtnDirs();
    reconstruirUI(false);
    if (!claves.length) avisar('Direcciones ubicadas: ' + ubicadas + ' de ' + total + ' ✔');
    return;
  }
  var kd = claves.shift();
  var info = dirsPend[kd];
  geocodificar(kd).then(function(res){
    dirsHechas[kd] = true;
    delete dirsPend[kd];
    if (res){
      var pt = { lat: res[0], lng: res[1], remesa: info.remesa, ruta: info.ruta,
                 detalle: { direccion: kd, medidores: info.cant,
                            meds: info.meds || [], tipo: 'DIR' } };
      if (!puntos.some(function(p){ return claveP(p) === claveP(pt); })){
        puntos.push(pt);
        ubicadas++;
      }
    }
    guardarPuntos(); guardarDirs();
    var hechas = total - claves.length;
    avisar('Ubicando ' + hechas + '/' + total + ' · ' + kd +
           ' · ~' + Math.ceil(claves.length * 1.2 / 60) + ' min restantes', false, true);
    if (hechas % 15 === 0){ reconstruirUI(false); actualizarBtnDirs(); }
    procesarDirs(claves, total, ubicadas);
  });
}

function exportarGeo(){
  var blob = new Blob([JSON.stringify({ geoDatos: geoDatos, geoCache: geoCache,
                                        puntos: puntos, dirsHechas: dirsHechas })],
                      { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'mapa_remesas_corrientes.json';
  a.click();
}

function importarGeo(file){
  var fr = new FileReader();
  fr.onload = function(){
    try {
      var d = JSON.parse(fr.result);
      if (d.geoDatos && d.geoDatos.segmentos){
        geoDatos = d.geoDatos;
        if (d.geoCache) geoCache = d.geoCache;
        if (d.puntos && d.puntos.length){
          var ex = {};
          puntos.forEach(function(p){ ex[claveP(p)] = true; });
          d.puntos.forEach(function(p){
            if (!ex[claveP(p)]){ ex[claveP(p)] = true; puntos.push(p); }
          });
          guardarPuntos();
        }
        if (d.dirsHechas){
          Object.keys(d.dirsHechas).forEach(function(k){ dirsHechas[k] = true; delete dirsPend[k]; });
          guardarDirs();
          actualizarBtnDirs();
        }
        guardarGeo();
        reconstruirUI(false);
        dibujarGeo();
        ajustarVistaGeo();
        avisar('Datos importados: ' + geoDatos.segmentos.length + ' tramos ✔');
      } else avisar('El JSON no tiene el formato esperado.', true);
    } catch(e){ avisar('No pude leer el JSON: ' + e.message, true); }
  };
  fr.readAsText(file);
}

/* ============ BÚSQUEDA POR NÚMERO DE MEDIDOR ============ */
function buscarMedidor(){
  var q = $('inpMed').value.trim();
  var res = $('resBusqueda');
  capaBusqueda.clearLayers();
  if (!q){ res.style.display = 'none'; return; }

  var exactos = [], parciales = [];
  puntos.forEach(function(p){
    var d = p.detalle || {};
    if (d.medidor === q) exactos.push(p);
    else if (d.meds && d.meds.indexOf(q) !== -1) exactos.push(p);
    else if (d.medidor && d.medidor.indexOf(q) !== -1) parciales.push(p);
    else if (d.meds && d.meds.some(function(m){ return m.indexOf(q) !== -1; })) parciales.push(p);
  });
  var hallados = exactos.length ? exactos : parciales;

  res.style.display = 'block';
  if (!hallados.length){
    res.textContent = 'Medidor ' + q + ': no está en los puntos cargados. ' +
                      'Acordate que solo busca en los PDFs que ya cargaste.';
    return;
  }
  var p = hallados[0];
  // si su remesa está oculta, mostrarla
  if (remesasOff[p.remesa]){
    remesasOff[p.remesa] = false;
    reconstruirUI(false);
  }
  // resaltar: anillo + punto
  var anillo = L.circleMarker([p.lat, p.lng], {
    radius: 16, weight: 3, color: '#ffd400', fillColor: '#ffd400', fillOpacity: 0.15
  });
  capaBusqueda.addLayer(anillo);
  var marca = L.circleMarker([p.lat, p.lng], {
    radius: 6, weight: 2, color: '#111', fillColor: '#ffd400', fillOpacity: 1
  });
  marca.bindPopup('<b>🔍 Medidor ' + q + '</b><br>' + popupDe(p));
  capaBusqueda.addLayer(marca);
  map.setView([p.lat, p.lng], 18);
  marca.openPopup();

  var desc = (p.detalle && p.detalle.direccion) ? p.detalle.direccion
           : (p.detalle && p.detalle.linea) ? 'alta registrada por GPS' : '';
  res.textContent = 'Medidor ' + q + ' → Remesa ' + p.remesa +
                    (p.ruta ? ' · Ruta ' + p.ruta : '') + (desc ? ' · ' + desc : '') +
                    (hallados.length > 1 ? ' (+' + (hallados.length - 1) + ' coincidencias más)' : '');
}

    actualizarBtnDirs();
    reconstruirUI(false);
    avisar('Puntos borrados.');
  }
};
$('btnBuscar').onclick = buscarMedidor;
$('inpMed').addEventListener('keydown', function(e){
  if (e.key === 'Enter'){ buscarMedidor(); this.blur(); }
});
$('btnDirs').onclick = ubicarDirs;
$('btnGeo').onclick = iniciarGeo;
$('btnGeoExp').onclick = exportarGeo;
$('btnGeoImp').onclick = function(){ $('fileGeo').click(); };
$('fileGeo').onchange = function(){
  if (this.files.length) importarGeo(this.files[0]);
  this.value = '';
};
$('chkContornos').onchange = dibujarGeo;
$('chkRutas').onchange = dibujarGeo;
$('panelHandle').onclick = function(){
  var p = $('panel');
  p.className = (p.className === 'cerrado') ? '' : 'cerrado';
};

/* PWA: registrar el service worker (solo cuando corre desde una web, no file://) */
if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}

/* Al abrir: restaurar lo geocodificado si existe */
reconstruirUI(false);
actualizarBtnDirs();
if (geoDatos.segmentos.length) ajustarVistaGeo();
</script>
</body>
</html>
